<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familienkalender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sofia+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --see:#1F5673;        /* Balaton-Blau */
    --see-tief:#143C52;
    --sand:#F6F1E7;       /* Uferpapier */
    --schilf:#6E7F4F;
    --sonne:#E2A23B;
    --tinte:#22292E;
    --linie:#DDD3C0;
    --weiss:#FFFFFF;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Sofia Sans',system-ui,sans-serif;
    background:var(--sand);
    color:var(--tinte);
    min-height:100vh;
  }
  header{
    background:var(--see);
    color:var(--weiss);
    padding:20px 16px 14px;
  }
  .kopf-innen{max-width:980px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 16px}
  .abmelden{
    margin-left:auto;background:transparent;border:1.5px solid rgba(255,255,255,.5);
    color:var(--weiss);padding:6px 14px;border-radius:999px;font-weight:600;font-size:.9rem;
  }
  .abmelden:hover{border-color:var(--weiss)}
  #anmeldung{
    max-width:400px;margin:40px auto;background:var(--weiss);border:1.5px solid var(--linie);
    border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;gap:6px;
  }
  #anmeldung h2{font-family:'Fraunces',serif;font-weight:600}
  #anmeldung[hidden],#kalenderBereich[hidden]{display:none}
  .anmelde-hinweis{color:#6B6353;margin-bottom:8px}
  .anmelde-felder{display:flex;flex-direction:column;gap:12px}
  .anmelde-fehler{color:#A33B2E;font-weight:600}
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:.2px}
  .untertitel{opacity:.75;font-size:.95rem}
  main{max-width:980px;margin:0 auto;padding:16px}

  /* Monatsnavigation */
  .monat-zeile{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 14px}
  .monat-name{font-family:'Fraunces',serif;font-size:clamp(1.2rem,3.5vw,1.7rem);font-weight:600}
  .nav-knoepfe{display:flex;gap:8px}
  button{
    font-family:inherit;font-size:1rem;cursor:pointer;border:none;border-radius:10px;
  }
  .nav-knopf{
    background:var(--weiss);border:1.5px solid var(--linie);width:42px;height:42px;
    font-size:1.2rem;color:var(--see);font-weight:700;
  }
  .nav-knopf:hover{border-color:var(--see)}
  .heute-knopf{background:var(--weiss);border:1.5px solid var(--linie);padding:0 14px;height:42px;color:var(--see);font-weight:600}
  .heute-knopf:hover{border-color:var(--see)}

  /* Familienlegende */
  .legende{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{
    display:flex;align-items:center;gap:7px;background:var(--weiss);
    border:1.5px solid var(--linie);border-radius:999px;padding:7px 14px;font-weight:600;font-size:.95rem;
    user-select:none;
  }
  .chip[aria-pressed="false"]{opacity:.38}
  .chip:focus-visible,.nav-knopf:focus-visible,.heute-knopf:focus-visible{outline:3px solid var(--sonne);outline-offset:2px}
  .punkt{width:12px;height:12px;border-radius:50%;flex:none}

  /* Kalendergitter */
  .gitter{
    background:var(--weiss);border:1.5px solid var(--linie);border-radius:var(--radius);
    overflow:hidden;
  }
  .wochentage,.woche{display:grid;grid-template-columns:repeat(7,1fr)}
  .wochentage div{
    padding:10px 6px;text-align:center;font-weight:700;font-size:.8rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--see);border-bottom:1.5px solid var(--linie);
  }
  .tag{
    min-height:96px;border-top:1px solid var(--linie);border-left:1px solid var(--linie);
    padding:6px;cursor:pointer;position:relative;background:var(--weiss);
    display:flex;flex-direction:column;gap:3px;text-align:left;font-family:inherit;
  }
  .woche .tag:first-child{border-left:none}
  .woche:first-child .tag{border-top:none}
  .tag:hover{background:#FBF8F1}
  .tag:focus-visible{outline:3px solid var(--sonne);outline-offset:-3px;z-index:1}
  .tag.fremd{background:#F3EEE3;color:#9A9184}
  .tag.heute .tagnr{background:var(--sonne);color:var(--weiss)}
  .tagnr{
    width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.9rem;flex:none;
  }
  .eintrag{
    font-size:.78rem;line-height:1.25;padding:2px 6px;border-radius:6px;color:var(--weiss);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;
  }
  .mehr{font-size:.75rem;color:var(--see);font-weight:700}

  /* Durchgehende Balken für mehrtägige Termine */
  .woche{position:relative}
  .balken{
    position:absolute;height:17px;border-radius:9px;color:var(--weiss);
    font-size:.72rem;font-weight:700;line-height:17px;padding:0 8px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    pointer-events:none;z-index:1;
  }
  .balken.offen-links{border-top-left-radius:0;border-bottom-left-radius:0}
  .balken.offen-rechts{border-top-right-radius:0;border-bottom-right-radius:0}
  .balken-platz{flex:none}

  /* Dialog */
  dialog{
    border:none;border-radius:var(--radius);padding:0;max-width:440px;width:calc(100vw - 32px);
    box-shadow:0 20px 60px rgba(20,60,82,.35);
  }
  dialog::backdrop{background:rgba(20,60,82,.45)}
  .dialog-kopf{
    background:var(--see);color:var(--weiss);padding:16px 20px;
    font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .schliessen{background:transparent;color:var(--weiss);font-size:1.5rem;line-height:1;padding:2px 6px}
  .dialog-koerper{padding:18px 20px 20px;display:flex;flex-direction:column;gap:14px}
  .tages-liste{display:flex;flex-direction:column;gap:8px}
  .tages-eintrag{
    display:flex;align-items:center;gap:10px;background:var(--sand);
    border-radius:10px;padding:9px 12px;
  }
  .tages-eintrag .info{flex:1;min-width:0}
  .tages-eintrag .titel{font-weight:700}
  .tages-eintrag .meta{font-size:.85rem;color:#5A6167}
  .loeschen{background:transparent;color:#A33B2E;font-size:1.15rem;padding:4px 8px}
  .loeschen:hover{background:#F5E4E1;border-radius:8px}
  .bearbeiten,.verlauf-knopf{background:transparent;color:var(--see);font-size:1.05rem;padding:4px 8px}
  .bearbeiten:hover,.verlauf-knopf:hover{background:#E8EEF2;border-radius:8px}
  .verlauf{
    font-size:.82rem;color:#4A5157;background:var(--weiss);border:1.5px solid var(--linie);
    border-radius:10px;padding:8px 12px;margin-top:-4px;
  }
  .verlauf div{padding:2px 0}
  .verlauf .wann{font-weight:700;color:var(--see)}
  .abbrechen{background:transparent;color:#5A6167;font-weight:600;padding:8px;text-decoration:underline}
  .leer-hinweis{color:#8A8272;font-style:italic}
  form{display:flex;flex-direction:column;gap:10px;border-top:1.5px solid var(--linie);padding-top:14px}
  label{font-weight:700;font-size:.9rem}
  input,select{
    font-family:inherit;font-size:1rem;padding:10px 12px;border:1.5px solid var(--linie);
    border-radius:10px;background:var(--weiss);width:100%;
  }
  input:focus,select:focus{outline:none;border-color:var(--see)}
  .zeit-zeile{display:flex;gap:10px}
  .zeit-zeile>div{flex:1}
  .speichern{
    background:var(--see);color:var(--weiss);font-weight:700;padding:12px;font-size:1.05rem;margin-top:4px;
  }
  .speichern:hover{background:var(--see-tief)}

  /* Statusleiste */
  .status{
    text-align:center;font-size:.85rem;color:#7B7160;padding:14px 0 20px;
  }
  .status.fehler{color:#A33B2E;font-weight:600}

  @media (max-width:640px){
    .tag{min-height:64px;padding:4px}
    .eintrag{display:none}
    .tag .marker{display:flex;flex-wrap:wrap;gap:3px}
    .marker .punkt{width:8px;height:8px}
    .mehr{display:none}
  }
  @media (min-width:641px){.tag .marker{display:none}}
  @media (prefers-reduced-motion:no-preference){
    dialog[open]{animation:auf .18s ease-out}
    @keyframes auf{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<header>
  <div class="kopf-innen">
    <h1>Familienkalender</h1>
    <span class="untertitel">Wer hat wann Zeit?</span>
    <button class="abmelden" id="abmeldenKnopf" hidden>Abmelden</button>
  </div>
</header>

<main>
  <section id="anmeldung" hidden>
    <h2>Anmelden</h2>
    <p class="anmelde-hinweis">Melde dich mit deinem Familien-Konto an.</p>
    <div class="anmelde-felder">
      <div>
        <label for="lEmail">E-Mail</label>
        <input id="lEmail" type="email" autocomplete="username" required>
      </div>
      <div>
        <label for="lPasswort">Passwort</label>
        <input id="lPasswort" type="password" autocomplete="current-password" required>
      </div>
      <p class="anmelde-fehler" id="anmeldeFehler" hidden></p>
      <button class="speichern" id="anmeldenKnopf">Anmelden</button>
    </div>
  </section>

  <div id="kalenderBereich" hidden>
  <div class="monat-zeile">
    <div class="monat-name" id="monatName"></div>
    <div class="nav-knoepfe">
      <button class="heute-knopf" id="heuteKnopf">Heute</button>
      <button class="nav-knopf" id="zurueck" aria-label="Voriger Monat">‹</button>
      <button class="nav-knopf" id="vor" aria-label="Nächster Monat">›</button>
    </div>
  </div>

  <div class="legende" id="legende" aria-label="Familienmitglieder ein- und ausblenden"></div>

  <div class="gitter">
    <div class="wochentage">
      <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
    </div>
    <div id="wochen"></div>
  </div>

  </div>

  <p class="status" id="status">Verbinde mit dem Kalender …</p>
</main>

<dialog id="tagDialog">
  <div class="dialog-kopf">
    <span id="dialogTitel"></span>
    <button class="schliessen" id="dialogZu" aria-label="Schließen">×</button>
  </div>
  <div class="dialog-koerper">
    <div class="tages-liste" id="tagesListe"></div>
    <form id="neuForm">
      <div>
        <label for="fTitel" id="formLabel">Neuer Termin</label>
        <input id="fTitel" type="text" placeholder="z. B. Fußballtraining" required maxlength="80">
      </div>
      <div>
        <label for="fWer">Wer?</label>
        <select id="fWer" required></select>
      </div>
      <div class="zeit-zeile">
        <div>
          <label for="fStartDatum">Am</label>
          <input id="fStartDatum" type="date" required>
        </div>
        <div>
          <label for="fBisDatum">Bis (bei mehrtägigen)</label>
          <input id="fBisDatum" type="date">
        </div>
      </div>
      <div class="zeit-zeile">
        <div>
          <label for="fVon">Von</label>
          <input id="fVon" type="time">
        </div>
        <div>
          <label for="fBis">Bis</label>
          <input id="fBis" type="time">
        </div>
      </div>
      <button class="speichern" type="submit" id="speichernKnopf">Termin speichern</button>
      <button class="abbrechen" type="button" id="abbrechenKnopf" hidden>Bearbeiten abbrechen</button>
    </form>
  </div>
</dialog>

<script type="module">
/* ============================================================
   1) FAMILIE ANPASSEN
   Hier eure Namen und Farben eintragen – so viele ihr wollt.
   Bei "email" die Anmelde-Adresse aus Firebase Authentication
   eintragen, damit der Verlauf Namen statt E-Mails zeigt.
   ============================================================ */
const FAMILIE = [
  { id: "papa",    name: "Papa",    farbe: "#1F5673", email: "" },
  { id: "mama",    name: "Mama",    farbe: "#A33B2E", email: "" },
  { id: "vincent", name: "Vincent", farbe: "#6E7F4F", email: "v.r.rasch@icloud.com" },
  { id: "evelyn",  name: "Evelyn",  farbe: "#E2A23B", email: "" },
];

/* ============================================================
   2) FIREBASE-KONFIGURATION EINTRAGEN
   Diese Werte bekommst du aus der Firebase-Konsole –
   siehe ANLEITUNG.md, Schritt 4.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBnf83MOYlsFl1WY85YgNPMsdE58-4xXdU",
  authDomain: "famielienkalender-387ad.firebaseapp.com",
  projectId: "famielienkalender-387ad",
  storageBucket: "famielienkalender-387ad.firebasestorage.app",
  messagingSenderId: "907089501494",
  appId: "1:907089501494:web:7025fbab63670ee9886797"
};

/* ============================================================
   Ab hier musst du nichts mehr ändern.
   ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const status = document.getElementById("status");
let db = null;
let termine = [];            // { id, datum:"2026-07-19", titel, wer, von, bis }
const aktiveMitglieder = new Set(FAMILIE.map(m => m.id));
let anzeigeJahr, anzeigeMonat;     // aktuell angezeigter Monat
let offenesDatum = null;           // Datum im Dialog

const heute = new Date();
anzeigeJahr = heute.getFullYear();
anzeigeMonat = heute.getMonth();

const MONATE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const iso = (j,m,t) => `${j}-${String(m+1).padStart(2,"0")}-${String(t).padStart(2,"0")}`;
const mitglied = id => FAMILIE.find(m => m.id === id);
const mitgliedZuEmail = mail =>
  FAMILIE.find(m => (m.email || "").toLowerCase() === (mail || "").toLowerCase());
const anzeigeName = mail => mitgliedZuEmail(mail)?.name || mail || "unbekannt";
// Fällt Termin e auf den Tag dIso? (mehrtägige Termine laufen von datum bis datumBis)
const faelltAuf = (e, dIso) => dIso >= e.datum && dIso <= (e.datumBis || e.datum);
const istMehrtaegig = e => e.datumBis && e.datumBis !== e.datum;
const kurzDatum = isoStr => `${isoStr.slice(8,10)}.${isoStr.slice(5,7)}.`;

/* ---------- Firebase verbinden (mit Login) ---------- */
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const anmeldung = document.getElementById("anmeldung");
const kalenderBereich = document.getElementById("kalenderBereich");
const abmeldenKnopf = document.getElementById("abmeldenKnopf");
const anmeldeFehler = document.getElementById("anmeldeFehler");
let stopSnapshot = null;
let angemeldetAls = "";       // E-Mail des angemeldeten Nutzers (für den Verlauf)

function zeigeKalender(sichtbar) {
  kalenderBereich.hidden = !sichtbar;
  anmeldung.hidden = sichtbar;
  abmeldenKnopf.hidden = !sichtbar;
}

if (firebaseConfig.apiKey === "HIER_EINTRAGEN") {
  zeigeKalender(true);
  status.textContent = "Firebase ist noch nicht eingerichtet – trage deine Konfiguration im Code ein (siehe ANLEITUNG.md). Der Kalender läuft solange ohne Speicherung.";
  status.classList.add("fehler");
} else {
  try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (nutzer) => {
      if (nutzer) {
        angemeldetAls = nutzer.email || "";
        const ich = mitgliedZuEmail(angemeldetAls);
        if (ich) fWer.value = ich.id;
        zeigeKalender(true);
        status.textContent = "Verbinde mit dem Kalender …";
        stopSnapshot = onSnapshot(collection(db, "termine"), (schnappschuss) => {
          termine = schnappschuss.docs.map(d => ({ id: d.id, ...d.data() }));
          status.textContent = `Angemeldet als ${anzeigeName(angemeldetAls)} – Änderungen sind sofort für alle sichtbar.`;
          status.classList.remove("fehler");
          zeichneMonat();
          if (offenesDatum) fuelleTagesListe(offenesDatum);
        }, (fehler) => {
          status.textContent = "Verbindung fehlgeschlagen: " + fehler.message;
          status.classList.add("fehler");
        });
      } else {
        if (stopSnapshot) { stopSnapshot(); stopSnapshot = null; }
        termine = [];
        zeigeKalender(false);
        status.textContent = "Bitte melde dich an, um den Kalender zu sehen.";
        status.classList.remove("fehler");
      }
    });

    const anmelden = async () => {
      anmeldeFehler.hidden = true;
      try {
        await signInWithEmailAndPassword(auth,
          document.getElementById("lEmail").value.trim(),
          document.getElementById("lPasswort").value);
        document.getElementById("lPasswort").value = "";
      } catch (f) {
        anmeldeFehler.textContent =
          (f.code === "auth/invalid-credential" || f.code === "auth/wrong-password" || f.code === "auth/user-not-found")
            ? "E-Mail oder Passwort stimmt nicht."
            : "Anmeldung fehlgeschlagen: " + f.message;
        anmeldeFehler.hidden = false;
      }
    };
    document.getElementById("anmeldenKnopf").addEventListener("click", anmelden);
    document.getElementById("lPasswort").addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") anmelden();
    });
    abmeldenKnopf.addEventListener("click", () => signOut(auth));
  } catch (f) {
    status.textContent = "Firebase-Fehler: " + f.message;
    status.classList.add("fehler");
  }
}

/* ---------- Legende ---------- */
const legende = document.getElementById("legende");
for (const m of FAMILIE) {
  const b = document.createElement("button");
  b.className = "chip";
  b.setAttribute("aria-pressed", "true");
  b.innerHTML = `<span class="punkt" style="background:${m.farbe}"></span>${m.name}`;
  b.addEventListener("click", () => {
    if (aktiveMitglieder.has(m.id)) aktiveMitglieder.delete(m.id);
    else aktiveMitglieder.add(m.id);
    b.setAttribute("aria-pressed", aktiveMitglieder.has(m.id) ? "true" : "false");
    zeichneMonat();
  });
  legende.appendChild(b);
}

/* ---------- Auswahlliste im Formular ---------- */
const fWer = document.getElementById("fWer");
for (const m of FAMILIE) {
  const o = document.createElement("option");
  o.value = m.id; o.textContent = m.name;
  fWer.appendChild(o);
}

/* ---------- Monat zeichnen ---------- */
const wochenEl = document.getElementById("wochen");
function zeichneMonat() {
  document.getElementById("monatName").textContent = `${MONATE[anzeigeMonat]} ${anzeigeJahr}`;
  wochenEl.innerHTML = "";

  const erster = new Date(anzeigeJahr, anzeigeMonat, 1);
  let start = new Date(erster);
  start.setDate(1 - ((erster.getDay() + 6) % 7)); // Montag der ersten Woche

  const heuteIso = iso(heute.getFullYear(), heute.getMonth(), heute.getDate());

  for (let w = 0; w < 6; w++) {
    const woche = document.createElement("div");
    woche.className = "woche";
    const wochenTage = [];
    for (let t = 0; t < 7; t++) {
      const d = new Date(start);
      d.setDate(start.getDate() + w * 7 + t);
      const dIso = iso(d.getFullYear(), d.getMonth(), d.getDate());
      wochenTage.push(dIso);
      const zelle = document.createElement("button");
      zelle.className = "tag";
      zelle.setAttribute("aria-label", d.toLocaleDateString("de-DE", { weekday:"long", day:"numeric", month:"long" }));
      if (d.getMonth() !== anzeigeMonat) zelle.classList.add("fremd");
      if (dIso === heuteIso) zelle.classList.add("heute");

      const nr = document.createElement("span");
      nr.className = "tagnr";
      nr.textContent = d.getDate();
      zelle.appendChild(nr);

      // Platzhalter für die Balken – Höhe wird gesetzt, sobald die Spuren feststehen
      const platz = document.createElement("span");
      platz.className = "balken-platz";
      zelle.appendChild(platz);

      // In den Zellen nur eintägige Termine – mehrtägige kommen als Balken
      const desTages = termine
        .filter(e => !istMehrtaegig(e) && faelltAuf(e, dIso) && aktiveMitglieder.has(e.wer))
        .sort((a,b) => (a.von || "99") < (b.von || "99") ? -1 : 1);

      const marker = document.createElement("span");
      marker.className = "marker";
      for (const e of desTages.slice(0, 8)) {
        const p = document.createElement("span");
        p.className = "punkt";
        p.style.background = mitglied(e.wer)?.farbe || "#888";
        marker.appendChild(p);
      }
      zelle.appendChild(marker);

      for (const e of desTages.slice(0, 3)) {
        const bal = document.createElement("span");
        bal.className = "eintrag";
        bal.style.background = mitglied(e.wer)?.farbe || "#888";
        bal.textContent = (e.von ? e.von + " " : "") + e.titel;
        zelle.appendChild(bal);
      }
      if (desTages.length > 3) {
        const mehr = document.createElement("span");
        mehr.className = "mehr";
        mehr.textContent = `+${desTages.length - 3} weitere`;
        zelle.appendChild(mehr);
      }

      zelle.addEventListener("click", () => oeffneTag(dIso, d));
      woche.appendChild(zelle);
    }

    /* ----- Mehrtägige Termine als durchgehende Balken über die Woche legen ----- */
    const wochenStart = wochenTage[0], wochenEnde = wochenTage[6];
    const inDieserWoche = termine
      .filter(e => istMehrtaegig(e) && aktiveMitglieder.has(e.wer)
                && e.datum <= wochenEnde && e.datumBis >= wochenStart)
      .sort((a,b) => a.datum < b.datum ? -1 : (a.datum > b.datum ? 1 : (a.datumBis > b.datumBis ? -1 : 1)));

    const spuren = []; // pro Spur: belegte Spalten [von, bis]
    const BALKEN_H = 19, OBEN = window.matchMedia("(max-width:640px)").matches ? 34 : 37;

    for (const e of inDieserWoche) {
      const vonSp = Math.max(0, wochenTage.indexOf(e.datum) !== -1 ? wochenTage.indexOf(e.datum) : 0);
      const bisSp = wochenTage.indexOf(e.datumBis) !== -1 ? wochenTage.indexOf(e.datumBis) : 6;
      let spur = spuren.findIndex(belegt => belegt.every(([a,b]) => bisSp < a || vonSp > b));
      if (spur === -1) { spuren.push([]); spur = spuren.length - 1; }
      spuren[spur].push([vonSp, bisSp]);

      const balken = document.createElement("span");
      balken.className = "balken";
      if (e.datum < wochenStart) balken.classList.add("offen-links");
      if (e.datumBis > wochenEnde) balken.classList.add("offen-rechts");
      balken.style.background = mitglied(e.wer)?.farbe || "#888";
      balken.style.left = `calc(${vonSp} / 7 * 100% + ${e.datum < wochenStart ? 0 : 4}px)`;
      balken.style.width = `calc(${bisSp - vonSp + 1} / 7 * 100% - ${(e.datum < wochenStart ? 0 : 4) + (e.datumBis > wochenEnde ? 0 : 4)}px)`;
      balken.style.top = `${OBEN + spur * BALKEN_H}px`;
      balken.textContent = e.titel;
      woche.appendChild(balken);
    }

    // Zellen so viel Platz freihalten, wie Balkenspuren da sind
    if (spuren.length > 0) {
      for (const platz of woche.querySelectorAll(".balken-platz")) {
        platz.style.height = `${spuren.length * BALKEN_H}px`;
      }
    }

    wochenEl.appendChild(woche);
  }
}

/* ---------- Navigation ---------- */
document.getElementById("zurueck").addEventListener("click", () => {
  anzeigeMonat--; if (anzeigeMonat < 0) { anzeigeMonat = 11; anzeigeJahr--; }
  zeichneMonat();
});
document.getElementById("vor").addEventListener("click", () => {
  anzeigeMonat++; if (anzeigeMonat > 11) { anzeigeMonat = 0; anzeigeJahr++; }
  zeichneMonat();
});
document.getElementById("heuteKnopf").addEventListener("click", () => {
  anzeigeJahr = heute.getFullYear(); anzeigeMonat = heute.getMonth();
  zeichneMonat();
});

/* ---------- Tagesdialog ---------- */
const dialog = document.getElementById("tagDialog");
function oeffneTag(dIso, d) {
  offenesDatum = dIso;
  document.getElementById("dialogTitel").textContent =
    d.toLocaleDateString("de-DE", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  fuelleTagesListe(dIso);
  beendeBearbeitung();
  dialog.showModal();
}
document.getElementById("dialogZu").addEventListener("click", () => dialog.close());
dialog.addEventListener("close", () => { offenesDatum = null; });

function fuelleTagesListe(dIso) {
  const liste = document.getElementById("tagesListe");
  liste.innerHTML = "";
  const desTages = termine
    .filter(e => faelltAuf(e, dIso))
    .sort((a,b) => {
      if (istMehrtaegig(a) !== istMehrtaegig(b)) return istMehrtaegig(a) ? -1 : 1;
      return (a.von || "99") < (b.von || "99") ? -1 : 1;
    });
  if (desTages.length === 0) {
    liste.innerHTML = `<p class="leer-hinweis">Noch keine Termine – trag unten den ersten ein.</p>`;
    return;
  }
  for (const e of desTages) {
    const zeile = document.createElement("div");
    zeile.className = "tages-eintrag";
    let zeit;
    if (istMehrtaegig(e)) {
      zeit = `${kurzDatum(e.datum)} – ${kurzDatum(e.datumBis)}`;
    } else {
      zeit = e.von ? (e.von + (e.bis ? "–" + e.bis : "") + " Uhr") : "ganztägig";
    }
    zeile.innerHTML = `
      <span class="punkt" style="background:${mitglied(e.wer)?.farbe || "#888"}"></span>
      <span class="info">
        <span class="titel">${escapeHtml(e.titel)}</span><br>
        <span class="meta">${mitglied(e.wer)?.name || e.wer} · ${zeit}</span>
      </span>`;

    const bearbKnopf = document.createElement("button");
    bearbKnopf.className = "bearbeiten";
    bearbKnopf.setAttribute("aria-label", "Termin bearbeiten");
    bearbKnopf.textContent = "✎";
    bearbKnopf.addEventListener("click", () => starteBearbeitung(e));
    zeile.appendChild(bearbKnopf);

    const verlaufKnopf = document.createElement("button");
    verlaufKnopf.className = "verlauf-knopf";
    verlaufKnopf.setAttribute("aria-label", "Änderungsverlauf anzeigen");
    verlaufKnopf.textContent = "🕒";
    zeile.appendChild(verlaufKnopf);

    const loeschKnopf = document.createElement("button");
    loeschKnopf.className = "loeschen";
    loeschKnopf.setAttribute("aria-label", "Termin löschen");
    loeschKnopf.textContent = "🗑";
    loeschKnopf.addEventListener("click", async () => {
      if (!db) return;
      if (confirm(`„${e.titel}" wirklich löschen?`)) {
        await deleteDoc(doc(db, "termine", e.id));
      }
    });
    zeile.appendChild(loeschKnopf);
    liste.appendChild(zeile);

    const verlaufBox = document.createElement("div");
    verlaufBox.className = "verlauf";
    verlaufBox.hidden = true;
    const eintraege = [...(e.verlauf || [])].reverse();
    if (eintraege.length === 0) {
      verlaufBox.textContent = "Kein Verlauf vorhanden (Termin stammt aus der Zeit vor dieser Funktion).";
    } else {
      for (const v of eintraege) {
        const z = document.createElement("div");
        const details = v.aktion === "geändert"
          ? (v.aenderungen && v.aenderungen.length ? ": " + v.aenderungen.join("; ") : "")
          : "";
        z.innerHTML = `<span class="wann">${escapeHtml(formatWann(v.wann))}</span> – ${escapeHtml(anzeigeName(v.wer))} hat den Termin ${v.aktion === "geändert" ? "geändert" : "erstellt"}${escapeHtml(details)}`;
        verlaufBox.appendChild(z);
      }
    }
    liste.appendChild(verlaufBox);
    verlaufKnopf.addEventListener("click", () => { verlaufBox.hidden = !verlaufBox.hidden; });
  }
}

/* ---------- Bearbeiten & Verlauf ---------- */
let bearbeiteId = null;

function formatWann(isoTs) {
  if (!isoTs) return "unbekannt";
  const d = new Date(isoTs);
  return d.toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit", year:"numeric" })
       + ", " + d.toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit" }) + " Uhr";
}

function starteBearbeitung(e) {
  bearbeiteId = e.id;
  document.getElementById("formLabel").textContent = "Termin bearbeiten";
  document.getElementById("speichernKnopf").textContent = "Änderungen speichern";
  document.getElementById("abbrechenKnopf").hidden = false;
  document.getElementById("fTitel").value = e.titel;
  fWer.value = e.wer;
  document.getElementById("fStartDatum").value = e.datum;
  const fBisD = document.getElementById("fBisDatum");
  fBisD.min = e.datum;
  fBisD.value = e.datumBis || "";
  document.getElementById("fVon").value = e.von || "";
  document.getElementById("fBis").value = e.bis || "";
  document.getElementById("fTitel").focus();
}

function beendeBearbeitung() {
  bearbeiteId = null;
  document.getElementById("formLabel").textContent = "Neuer Termin";
  document.getElementById("speichernKnopf").textContent = "Termin speichern";
  document.getElementById("abbrechenKnopf").hidden = true;
  document.getElementById("neuForm").reset();
  const ich = mitgliedZuEmail(angemeldetAls);
  if (ich) fWer.value = ich.id;
  if (offenesDatum) {
    document.getElementById("fStartDatum").value = offenesDatum;
    document.getElementById("fBisDatum").min = offenesDatum;
  }
}
document.getElementById("abbrechenKnopf").addEventListener("click", beendeBearbeitung);

// Bis-Datum darf nie vor dem Startdatum liegen
document.getElementById("fStartDatum").addEventListener("change", () => {
  const s = document.getElementById("fStartDatum").value;
  const fBisD = document.getElementById("fBisDatum");
  fBisD.min = s;
  if (fBisD.value && fBisD.value < s) fBisD.value = "";
});

/* ---------- Neuer Termin / Änderungen speichern ---------- */
document.getElementById("neuForm").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  if (!offenesDatum) return;
  const titel = document.getElementById("fTitel").value.trim();
  if (!titel) return;

  const alt = bearbeiteId ? termine.find(t => t.id === bearbeiteId) : null;
  const startTag = document.getElementById("fStartDatum").value || (alt ? alt.datum : offenesDatum);
  let datumBis = document.getElementById("fBisDatum").value || "";
  if (datumBis && datumBis < startTag) {
    alert("Das Enddatum liegt vor dem Starttag – bitte korrigieren.");
    return;
  }
  if (datumBis === startTag) datumBis = "";

  const felder = {
    datum: startTag,
    titel,
    wer: fWer.value,
    datumBis,
    von: document.getElementById("fVon").value || "",
    bis: document.getElementById("fBis").value || "",
  };

  if (bearbeiteId && alt) {
    // Änderungen ermitteln für den Verlauf
    const aenderungen = [];
    const zeitText = f => f.von ? (f.von + (f.bis ? "–" + f.bis : "")) : "ganztägig";
    if (alt.titel !== felder.titel) aenderungen.push(`Titel: „${alt.titel}" → „${felder.titel}"`);
    if (alt.wer !== felder.wer) aenderungen.push(`Wer: ${mitglied(alt.wer)?.name || alt.wer} → ${mitglied(felder.wer)?.name || felder.wer}`);
    if (alt.datum !== felder.datum) aenderungen.push(`Startdatum: ${kurzDatum(alt.datum)} → ${kurzDatum(felder.datum)}`);
    if ((alt.datumBis || "") !== felder.datumBis) {
      aenderungen.push(`Bis-Datum: ${alt.datumBis ? kurzDatum(alt.datumBis) : "–"} → ${felder.datumBis ? kurzDatum(felder.datumBis) : "–"}`);
    }
    if ((alt.von || "") !== felder.von || (alt.bis || "") !== felder.bis) {
      aenderungen.push(`Zeit: ${zeitText(alt)} → ${zeitText(felder)}`);
    }
    if (aenderungen.length === 0) { beendeBearbeitung(); return; }

    const verlauf = [...(alt.verlauf || []), {
      wann: new Date().toISOString(),
      wer: angemeldetAls || "unbekannt",
      aktion: "geändert",
      aenderungen,
    }];

    if (!db) {
      Object.assign(alt, felder, { verlauf });
      zeichneMonat(); beendeBearbeitung(); dialog.close();
      return;
    }
    try {
      await updateDoc(doc(db, "termine", bearbeiteId), { ...felder, verlauf });
      beendeBearbeitung();
      dialog.close();
    } catch (f) {
      alert("Speichern fehlgeschlagen: " + f.message);
    }
    return;
  }

  const neu = {
    ...felder,
    verlauf: [{
      wann: new Date().toISOString(),
      wer: angemeldetAls || "unbekannt",
      aktion: "erstellt",
    }],
  };
  if (!db) {
    // Ohne Firebase: nur lokal in dieser Sitzung anzeigen
    termine.push({ id: "lokal-" + Date.now(), ...neu });
    zeichneMonat();
    document.getElementById("neuForm").reset();
    dialog.close();
    return;
  }
  try {
    await addDoc(collection(db, "termine"), neu);
    document.getElementById("neuForm").reset();
    dialog.close();
  } catch (f) {
    alert("Speichern fehlgeschlagen: " + f.message);
  }
});

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

zeichneMonat();
</script>
